version: "3.9"

# Local development environment — NOT for production use as-is
# Production requires: secrets manager, TLS certs, firewall rules, hardened images

services:

  # ─── APPLICATION ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "127.0.0.1:3000:3000"  # Bind to localhost only — not 0.0.0.0
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://payctrl:${DB_PASSWORD}@db:5432/payment_control?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Security: drop all Linux capabilities, run as non-root
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    networks: [internal]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── DATABASE ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payctrl
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: payment_control
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payctrl -d payment_control"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # No direct port exposure — only accessible by app container
    networks: [internal]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, SETGID, SETUID]
    logging:
      driver: json-file
      options:
        max-size: "20m"

  # ─── REDIS ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command CONFIG ""
      --rename-command SLAVEOF ""
      --rename-command DEBUG ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"

  # ─── CLAMAV (antimalware) ────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks: [internal]
    cap_drop: [ALL]

  # ─── REMINDER WORKER ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: node worker.js
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://payctrl:${DB_PASSWORD}@db:5432/payment_control?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    cap_drop: [ALL]
    user: "1001:1001"
    read_only: true
    tmpfs: [/tmp]
    networks: [internal]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  clamav_db:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true  # No direct internet access from containers
